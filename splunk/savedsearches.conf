# Ops Narrator — Splunk saved search that fires the agent webhook (Session 7).
#
# This is the demo trigger: a scheduled detection for encoded PowerShell (Windows
# Security 4688) whose webhook alert action POSTs the triggering event to the Ops
# Narrator FastAPI endpoint (webhook.py) at http://localhost:8000/alert.
#
# It was created live over the Splunk REST API (servicesNS/admin/search/saved/searches)
# and this file is the version-controlled copy of that stanza, captured from the
# running instance so it is reproducible and reviewable.
#
# Install (local Splunk):
#   cp splunk/savedsearches.conf "$SPLUNK_HOME/etc/apps/search/local/savedsearches.conf"
#   "$SPLUNK_HOME/bin/splunk" restart        # or: reload via Settings > Searches
# It then appears in Splunk Web → Settings → Searches, reports, and alerts.
#
# Design notes:
#   - `| sort 0 _time | head 1` makes the alert deterministic: it returns exactly the
#     earliest encoded-PowerShell event in the window = patient zero (BSTOLL-L,
#     2018-08-20 03:59:48 CST = 05:59:48 EDT). The webhook posts that single row.
#   - The detection itself is generic (no hostname/threat hardcoded) — only the
#     trigger; the agent's own anti-recall surface is unaffected.
#   - dispatch window is relative (-24h@h..now) so a stray scheduled run over today's
#     data matches nothing. For the BOTSv3 historical demo, dispatch with an explicit
#     Aug-2018 window (below).
#   - Ships `disabled = 1` so it never fires in the background (and never triggers a
#     real agent run / API spend unexpectedly). ARM it before the demo: set
#     `disabled = 0`, then let the cron fire or dispatch manually.
#
# Arm + fire for the BOTSv3 demo (explicit historical window + trigger the action):
#   curl -sk -u admin:$SPLUNK_PASSWORD \
#     "https://localhost:8089/servicesNS/admin/search/saved/searches/Ops%20Narrator%20-%20Encoded%20PowerShell%20Beachhead/dispatch" \
#     --data-urlencode trigger_actions=1 \
#     --data-urlencode dispatch.earliest_time=2018-08-20T00:00:00 \
#     --data-urlencode dispatch.latest_time=2018-08-20T12:00:00
#
# Verified end-to-end on 2026-05-24: Splunk POSTed to a live webhook.py (200 ack);
# the agent run itself is gated on Anthropic credits. See PROGRESS.md gotcha #12 for
# the captured payload shape (multivalue Account_Name, epoch _time, full -enc blob).

[Ops Narrator - Encoded PowerShell Beachhead]
search = index=botsv3 sourcetype=WinEventLog source="WinEventLog:Security" EventCode=4688 Process_Command_Line="*powershell*" Process_Command_Line="*-enc*" | sort 0 _time | head 1 | table _time, host, Account_Name, Creator_Process_Name, New_Process_Name, Process_Command_Line
description = Ops Narrator demo trigger: detects encoded-PowerShell (4688) and posts the patient-zero event to the agent webhook. Created disabled; arm before demo.
disabled = 1
is_scheduled = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.digest_mode = 1
action.webhook = 1
action.webhook.param.url = http://localhost:8000/alert
